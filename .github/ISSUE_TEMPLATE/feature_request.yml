name: Feature request
description: Suggest a generic improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Keep requests generic. Do not include tenant-specific values, mailbox addresses, domains, internal URLs, logs, screenshots, or proprietary details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What production or user need should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior using placeholders only.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
