name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Restore, build, test, and scan
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\ContactRelay.slnx

      - name: Build
        run: dotnet build .\ContactRelay.slnx -c Release --no-restore

      - name: Test
        run: dotnet test .\ContactRelay.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Format check
        run: dotnet format .\ContactRelay.slnx --verify-no-changes --no-restore --verbosity minimal

      - name: Dependency vulnerability check
        run: dotnet list .\ContactRelay\ContactRelay.csproj package --vulnerable --include-transitive

      - name: Deprecated package check
        run: dotnet list .\ContactRelay\ContactRelay.csproj package --deprecated
